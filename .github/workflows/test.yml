name: Generate Contributors Image

on:
  push:
    paths:
      - .all-contributorsrc

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate contributors image on main branch
        uses: skyash-dev/all-contributors-image@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
